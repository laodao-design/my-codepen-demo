            title: '2008.12.25 雨夹雪',
            content: `“失忆症患者最好不要开车，以防开到半路时忘了要去哪里，也忘了是从哪里来，更糟糕的是，忘了怎么开车。”

        这是我朋友高大威的原话，它被记录在几天前的日记里，现在我原封不动地抄过来，原因是那位朋友竟奇迹般地预判到了我的悲剧。

    // ================================================================
    //  4. 渲染引擎
    // ================================================================
    function render(pageId) {
        const page = PAGES[pageId];
        if (!page) {
            // 兜底：如果页面不存在，回到扉页
            currentPage = '扉页';
            return render('扉页');
        }

        // 更新当前页
        currentPage = pageId;
        discovered.add(pageId);

        // ---- 内容 ----
        const contentEl = document.getElementById('page-content');
        // 转义换行，保留 <strong> 等标签
        let html = page.content.replace(/\n/g, '<br>');
        // 但 <strong> 已经存在，不需要额外转义
        contentEl.innerHTML = html;

        // ---- 提示 ----
        document.getElementById('hint-area').innerHTML = page.hint;

        // ---- 进度 ----
        const total = ALL_PAGE_IDS.length; // 14
        const found = discovered.size;
        const pct = Math.min(100, Math.round((found / total) * 100));
        document.getElementById('progress-bar-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = pct + '%';

        // ---- 线索计数 ----
        document.getElementById('clue-num').textContent = Math.min(found, total);
        document.getElementById('clue-total').textContent = total;

        // ---- 清空搜索反馈 ----
        document.getElementById('search-feedback').textContent = '';
        document.getElementById('search-input').value = '';
        document.getElementById('search-input').focus();

        // ---- 如果通关 ----
        if (pageId === '通关') {

    // ================================================================

    function performSearch() {
        const input = document.getElementById('search-input');
        const keyword = input.value.trim();

        if (!keyword) {
            document.getElementById('search-feedback').textContent = '⚠️ 请输入一个关键词。';
            return;
        }

        // 精确匹配（忽略大小写，统一转小写比较，但保留原词显示）
        const lower = keyword.toLowerCase();
        let target = null;

        // 遍历路由表，匹配关键词（不区分大小写）
        for (const [key, value] of Object.entries(ROUTES)) {
            if (key.toLowerCase() === lower) {
                target = value;
                break;
            }
        }

        // 额外：如果搜索 "凌久时"，跳转到扉页（自我认知）
        if (lower === '凌久时' || lower === '凌久时') {
            target = '扉页';
        }

            const targetPage = PAGES[target];
            if (targetPage) {
                document.getElementById('search-feedback').textContent = '';
                render(target);

                // 如果到达通关页，自动触发特殊效果
                if (target === '通关') {
                    setTimeout(() => {
                        document.getElementById('search-feedback').textContent = '🕊️ 记忆完整。感谢你的探索。';
